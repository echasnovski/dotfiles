gui:
  scrollHeight: 10
  timeFormat: '2006-01-02 15:04:05 MST'
  theme:
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse
    activeBorderColor:
      - blue
    inactiveBorderColor:
      - white
  authorColors:
    'Evgeni Chasnovski': cyan
    '*': magenta
  showFileTree: false
  nerdFontsVersion: 3
  skipRewordInEditorWarning: true
  border: bold
  showCommandLog: false
git:
  branchLogCmd: git log --graph --color=always --abbrev-commit --decorate --date=iso --pretty=medium {{branchName}} --
  allBranchesLogCmds:
    - git log --all --graph --color=always --abbrev-commit --decorate --date=iso --pretty=medium
  autoFetch: false
  overrideGpg: true
update:
  method: never
notARepository: 'quit'
promptToReturnFromSubprocess: false
keybinding:
  files:
    # swap default bindings
    commitChanges: 'C'
    commitChangesWithEditor: 'c'
    toggleStagedAll: '<c-8>' # virtually disable stage/unstage all
